{% extends 'gestion/base.html' %}
{% load static %}

{% block title %}Iniciar Sesión - BienestarMind{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div style="background: var(--fondo-tarjeta); padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; border-top: 5px solid #39A900;">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="{% static 'img/LOGO_BIENESTARMIND.png' %}" width="250">
            <p style="color: var(--texto);">Ingresa tus credenciales</p>
        </div>

        <form method="POST" action="{% url 'login' %}" autocomplete="off">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Documento:</label>
        <input type="text" name="username" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required autocomplete="off">
    </div>
    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Contraseña:</label>
        <input type="password" name="password" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required autocomplete="new-password">
    </div>
    <button type="submit" style="width: 100%; padding: 12px; background-color: #39A900; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
        INGRESAR
    </button>
</form>
    </div>
</div>
{% endblock %}
